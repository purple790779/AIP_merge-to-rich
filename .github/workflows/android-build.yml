name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - 'generate-android-icons.cjs'
      - '.github/workflows/**'

jobs:
  build:
    name: Build Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App (Capacitor mode)
        run: npm run build
        env:
          VITE_BUILD_TARGET: capacitor

      - name: Generate Android Icons
        run: node generate-android-icons.cjs

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore upload keystore from secret
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload.keystore
          if [ ! -s android/app/upload.keystore ]; then
            echo "::error::Decoded keystore is empty."
            exit 1
          fi
          echo "✅ Keystore restored successfully: $(wc -c < android/app/upload.keystore) bytes"

      - name: Build Android App Bundle (signed release)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "--- Debug: Checking signing config ---"
          echo "KEYSTORE_PATH: $ANDROID_KEYSTORE_PATH"
          ls -la "$ANDROID_KEYSTORE_PATH" && echo "✅ Keystore file exists" || echo "❌ Keystore file NOT found"
          [ -n "$ANDROID_KEY_ALIAS" ] && echo "✅ KEY_ALIAS is set" || echo "❌ KEY_ALIAS is EMPTY"
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && echo "✅ KEYSTORE_PASSWORD is set" || echo "❌ KEYSTORE_PASSWORD is EMPTY"
          [ -n "$ANDROID_KEY_PASSWORD" ] && echo "✅ KEY_PASSWORD is set" || echo "❌ KEY_PASSWORD is EMPTY"
          echo "--- Starting Gradle build ---"
          ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
