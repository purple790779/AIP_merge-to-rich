name: Android AAB Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'android/**'
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - '.nvmrc'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'capacitor.config.ts'
      - 'generate-android-icons.cjs'
      - 'scripts/**'
      - '.github/workflows/**'

concurrency:
  group: android-aab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Signed Android App Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Read app metadata
        id: app_meta
        shell: bash
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=$(node -e "const fs=require('fs'); const text=fs.readFileSync('android/app/build.gradle','utf8'); const match=text.match(/versionCode\\s+(\\d+)/); if(!match){process.exit(1)}; process.stdout.write(match[1]);")
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Building v$APP_VERSION ($VERSION_CODE)"

      - name: Install dependencies
        run: npm ci

      - name: Build web app for Capacitor
        env:
          VITE_BUILD_TARGET: capacitor
        run: npm run build

      - name: Generate Android icons
        run: node generate-android-icons.cjs

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Restore upload keystore from GitHub Secret
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is missing."
            exit 1
          fi

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload.keystore

          if [ ! -s android/app/upload.keystore ]; then
            echo "::error::Decoded keystore is empty."
            exit 1
          fi

          echo "Keystore restored: $(wc -c < android/app/upload.keystore) bytes"

      - name: Build signed release AAB
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/upload.keystore
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          [ -n "$ANDROID_KEY_ALIAS" ] || (echo "::error::ANDROID_KEY_ALIAS secret is missing." && exit 1)
          [ -n "$ANDROID_KEYSTORE_PASSWORD" ] || (echo "::error::ANDROID_KEYSTORE_PASSWORD secret is missing." && exit 1)
          [ -n "$ANDROID_KEY_PASSWORD" ] || (echo "::error::ANDROID_KEY_PASSWORD secret is missing." && exit 1)
          [ -f "$ANDROID_KEYSTORE_PATH" ] || (echo "::error::Keystore file not found at $ANDROID_KEYSTORE_PATH" && exit 1)

          ./gradlew clean bundleRelease

      - name: Generate release metadata
        shell: bash
        run: |
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          [ -f "$AAB_PATH" ] || (echo "::error::AAB not found at $AAB_PATH" && exit 1)

          sha256sum "$AAB_PATH" | tee android/app/build/outputs/bundle/release/app-release.aab.sha256

          {
            echo "app_version=${{ steps.app_meta.outputs.app_version }}"
            echo "version_code=${{ steps.app_meta.outputs.version_code }}"
            echo "artifact=app-release.aab"
            echo "workflow_run=${{ github.run_id }}"
            echo "commit=${{ github.sha }}"
          } > android/app/build/outputs/bundle/release/build-metadata.txt

      - name: Upload signed AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: merge-money-tycoon-aab-v${{ steps.app_meta.outputs.app_version }}-vc${{ steps.app_meta.outputs.version_code }}
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/bundle/release/app-release.aab.sha256
            android/app/build/outputs/bundle/release/build-metadata.txt
          if-no-files-found: error
